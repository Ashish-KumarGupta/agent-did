name: CI — LangChain did:wba Demo Smoke

on:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/ci-langchain-didwba-smoke.yml"
      - "package.json"
      - "scripts/langchain-didwba-demo-smoke.mjs"
      - "sdk/**"
      - "sdk-python/**"
      - "integrations/langchain/**"
      - "integrations/langchain-python/**"
  pull_request:
    paths:
      - ".github/workflows/ci-langchain-didwba-smoke.yml"
      - "package.json"
      - "scripts/langchain-didwba-demo-smoke.mjs"
      - "sdk/**"
      - "sdk-python/**"
      - "integrations/langchain/**"
      - "integrations/langchain-python/**"
  workflow_dispatch:

concurrency:
  group: ci-langchain-didwba-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  didwba-demo-smoke:
    name: Node 20 + Python 3.12 - LangChain did:wba Demo Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            sdk/package-lock.json
            integrations/langchain/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install SDK dependencies
        run: npm --prefix sdk ci

      - name: Install LangChain JS integration dependencies
        run: npm --prefix integrations/langchain ci

      - name: Build TypeScript SDK
        run: npm --prefix sdk run build

      - name: Install Python SDK in dev mode
        working-directory: sdk-python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install LangChain Python integration in dev mode
        working-directory: integrations/langchain-python
        run: python -m pip install -e ".[dev]"

      - name: Run cross-package did:wba demo smoke
        run: npm run smoke:langchain-didwba