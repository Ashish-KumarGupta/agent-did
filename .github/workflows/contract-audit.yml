name: Contract Audit

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'contracts/**'
      - 'scripts/contract-audit.js'
      - '.github/workflows/contract-audit.yml'
      - 'package.json'
  pull_request:
    paths:
      - 'contracts/**'
      - 'scripts/contract-audit.js'
      - '.github/workflows/contract-audit.yml'
      - 'package.json'
  workflow_dispatch:

jobs:
  audit-contract:
    name: Slither and Mythril
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20

      - name: Run contract audit
        env:
          AUDIT_FAIL_ON_SEVERITY: low
        run: npm run audit:contracts

      - name: Upload audit reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: contract-audit-reports
          path: contracts/reports/security
          if-no-files-found: error